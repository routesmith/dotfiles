[cship]
lines = [
  "$directory$git_branch$git_status",
  "$cship.model  $cship.cost  $cship.context_bar  $cship.usage_limits",
]

[cship.model]
symbol = "⚡ "
style  = "bold fg:#83a598"

[cship.cost]
symbol             = "$ "
style              = "fg:#b8bb26"
warn_threshold     = 2.0
warn_style         = "fg:#fabd2f"
critical_threshold = 5.0
critical_style     = "bold fg:#fb4934"

[cship.context_bar]
width              = 12
style              = "fg:#8ec07c"
warn_threshold     = 40.0
warn_style         = "fg:#fabd2f"
critical_threshold = 70.0
critical_style     = "bold fg:#fb4934"

[cship.usage_limits]
five_hour_format   = "5h {pct}%"
seven_day_format   = "7d {pct}%"
separator          = " "
warn_threshold     = 70.0
warn_style         = "fg:#fabd2f"
critical_threshold = 90.0
critical_style     = "bold fg:#fb4934"
